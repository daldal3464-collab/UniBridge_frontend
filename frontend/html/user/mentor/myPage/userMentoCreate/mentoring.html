<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link href="https://hangeul.pstatic.net/hangeul_static/css/nanum-square-round.css" rel="stylesheet">
  <link rel="stylesheet" href="/frontend/assets/css/user/mentor/myPage/userMentoCreate/mentoring.css">
</head>
<body>
  <header>헤더</header>
  <main>
    <nav id = sidebar>
      사이드바
    </nav>
    <div id = contents>
      <div id = contentsHeader>
        <img src="/frontend/assets/img/user/userMyPageImg/userMentoring.jpg" alt="멘토링 관리 아이콘">
        <span>멘토링 관리</span>
      </div>
      <div id = contentsMain>
        <div id = mentoringBack>
          <div id = mentoringMain>
            <div>
            <div id = mentoring>
              <div id = "title">
                <span>학습 주제 및 목표</span>
              </div>
              <div class="subject">
                <label for="learningSubject">학습 과목</label>
                <input type="text" id="learningSubject">
              </div>
              <div class="subject">
                <label for="mentoringSubject">멘토링 주제</label>
                <input type="text" id="mentoringSubject">
              </div>
              <div id = purpose>
                <label for="mentoringPurpose">멘토링 목적</label>
                <textarea id="mentoringPurpose"></textarea>
              </div>
            </div>
            <div id = mentoringCurriculum>
              <div id = "text">
                <label for="curriculum">멘토링 커리큘럼 상세</label>
                <textarea id="curriculum"></textarea>
              </div>
              <div id="file">
                <div id="curriculumFileTitle">파일 첨부</div>
                <input type="file" id="curriculumFile">
              </div>
            </div>
          </div>
          <div id = profile>
            <img src="/frontend/assets/img/user/userProfile/ex1.png" alt="">
          </div>
          </div>
          <div>
            <button type="reset">취소</button>
          </div>
        </div>
      </div>
    </div>
  </main>
  <footer>푸터</footer>
</body>
</html>
